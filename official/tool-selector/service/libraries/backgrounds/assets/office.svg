<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Wall -->
  <rect x="0" y="0" width="1280" height="720" fill="#D4DDE6"/>
  <!-- Floor -->
  <rect x="0" y="520" width="1280" height="200" fill="#8B9DAF"/>
  <!-- Window -->
  <rect x="800" y="80" width="280" height="300" fill="#87CEEB" stroke="#5A6B7A" stroke-width="4"/>
  <line x1="940" y1="80" x2="940" y2="380" stroke="#5A6B7A" stroke-width="3"/>
  <line x1="800" y1="230" x2="1080" y2="230" stroke="#5A6B7A" stroke-width="3"/>
  <!-- Blinds -->
  <line x1="800" y1="100" x2="1080" y2="100" stroke="#A0B0C0" stroke-width="2"/>
  <line x1="800" y1="120" x2="1080" y2="120" stroke="#A0B0C0" stroke-width="2"/>
  <line x1="800" y1="140" x2="1080" y2="140" stroke="#A0B0C0" stroke-width="2"/>
  <line x1="800" y1="160" x2="1080" y2="160" stroke="#A0B0C0" stroke-width="2"/>
  <!-- Clock -->
  <circle cx="500" cy="150" r="50" fill="#FFFFFF" stroke="#333333" stroke-width="3"/>
  <line x1="500" y1="150" x2="500" y2="115" stroke="#333333" stroke-width="3"/>
  <line x1="500" y1="150" x2="525" y2="150" stroke="#333333" stroke-width="2"/>
  <circle cx="500" cy="150" r="4" fill="#333333"/>
  <!-- Desk -->
  <rect x="150" y="420" width="600" height="20" fill="#6B4E3D" rx="2"/>
  <rect x="170" y="440" width="15" height="80" fill="#5A3D2E"/>
  <rect x="715" y="440" width="15" height="80" fill="#5A3D2E"/>
  <!-- Monitor -->
  <rect x="350" y="300" width="200" height="120" fill="#1A1A2E" rx="5"/>
  <rect x="360" y="310" width="180" height="95" fill="#4A6FA5"/>
  <rect x="430" y="420" width="40" height="5" fill="#333333"/>
  <rect x="440" y="415" width="20" height="10" fill="#333333"/>
  <!-- Keyboard -->
  <rect x="380" y="430" width="140" height="8" fill="#444444" rx="2"/>
  <!-- Chair -->
  <rect x="380" y="500" width="120" height="20" fill="#2C3E50" rx="5"/>
  <rect x="420" y="480" width="40" height="20" fill="#2C3E50"/>
  <rect x="425" y="520" width="30" height="60" fill="#333333"/>
  <circle cx="410" cy="590" r="12" fill="#444444"/>
  <circle cx="470" cy="590" r="12" fill="#444444"/>
</svg>
