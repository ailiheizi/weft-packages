<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Wall -->
  <rect x="0" y="0" width="1280" height="720" fill="#E0E0E0"/>
  <!-- Floor -->
  <rect x="0" y="550" width="1280" height="170" fill="#616161"/>
  <!-- Floor mats -->
  <rect x="50" y="555" width="300" height="160" fill="#37474F" rx="3"/>
  <rect x="400" y="555" width="300" height="160" fill="#455A64" rx="3"/>
  <!-- Mirror wall -->
  <rect x="0" y="30" width="1280" height="400" fill="#B0BEC5" opacity="0.3" stroke="#90A4AE" stroke-width="2"/>
  <line x1="320" y1="30" x2="320" y2="430" stroke="#90A4AE" stroke-width="1"/>
  <line x1="640" y1="30" x2="640" y2="430" stroke="#90A4AE" stroke-width="1"/>
  <line x1="960" y1="30" x2="960" y2="430" stroke="#90A4AE" stroke-width="1"/>
  <!-- Weight rack -->
  <rect x="50" y="200" width="200" height="250" fill="#424242" stroke="#333333" stroke-width="2"/>
  <!-- Shelves -->
  <line x1="50" y1="280" x2="250" y2="280" stroke="#333333" stroke-width="3"/>
  <line x1="50" y1="350" x2="250" y2="350" stroke="#333333" stroke-width="3"/>
  <line x1="50" y1="420" x2="250" y2="420" stroke="#333333" stroke-width="3"/>
  <!-- Dumbbells -->
  <rect x="70" y="260" width="40" height="15" fill="#1A1A1A" rx="3"/>
  <rect x="130" y="260" width="40" height="15" fill="#1A1A1A" rx="3"/>
  <rect x="190" y="260" width="40" height="15" fill="#1A1A1A" rx="3"/>
  <rect x="70" y="330" width="45" height="15" fill="#1A1A1A" rx="3"/>
  <rect x="135" y="330" width="45" height="15" fill="#1A1A1A" rx="3"/>
  <rect x="70" y="400" width="50" height="15" fill="#1A1A1A" rx="3"/>
  <rect x="140" y="400" width="50" height="15" fill="#1A1A1A" rx="3"/>
  <!-- Treadmill -->
  <rect x="400" y="380" width="180" height="120" fill="#37474F" rx="5"/>
  <rect x="410" y="390" width="160" height="80" fill="#263238" rx="3"/>
  <rect x="420" y="470" width="20" height="80" fill="#455A64"/>
  <rect x="560" y="470" width="20" height="80" fill="#455A64"/>
  <rect x="400" y="350" width="10" height="150" fill="#455A64"/>
  <rect x="570" y="350" width="10" height="150" fill="#455A64"/>
  <rect x="395" y="340" width="190" height="15" fill="#37474F" rx="3"/>
  <!-- Exercise bike -->
  <circle cx="800" cy="510" r="40" fill="none" stroke="#455A64" stroke-width="5"/>
  <circle cx="800" cy="510" r="5" fill="#333333"/>
  <line x1="800" y1="510" x2="780" y2="420" stroke="#333333" stroke-width="4"/>
  <rect x="765" y="410" width="30" height="10" fill="#37474F" rx="3"/>
  <line x1="800" y1="510" x2="850" y2="450" stroke="#333333" stroke-width="4"/>
  <rect x="840" y="440" width="30" height="10" fill="#37474F" rx="3"/>
  <!-- Barbell on floor -->
  <rect x="950" y="520" width="200" height="8" fill="#333333"/>
  <circle cx="960" cy="524" r="25" fill="#1A1A1A" stroke="#333333" stroke-width="2"/>
  <circle cx="1140" cy="524" r="25" fill="#1A1A1A" stroke="#333333" stroke-width="2"/>
  <!-- Clock -->
  <circle cx="1100" cy="80" r="35" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
  <line x1="1100" y1="80" x2="1100" y2="55" stroke="#333333" stroke-width="2"/>
  <line x1="1100" y1="80" x2="1120" y2="80" stroke="#333333" stroke-width="1.5"/>
</svg>
