<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Dark background -->
  <rect x="0" y="0" width="1280" height="720" fill="#1A1A2E"/>
  <!-- Stage floor -->
  <rect x="0" y="550" width="1280" height="170" fill="#2D1B0E"/>
  <rect x="0" y="545" width="1280" height="10" fill="#4A2C17"/>
  <!-- Left curtain -->
  <rect x="0" y="0" width="180" height="720" fill="#8B0000"/>
  <rect x="20" y="0" width="30" height="720" fill="#A00000"/>
  <rect x="80" y="0" width="25" height="720" fill="#A00000"/>
  <rect x="130" y="0" width="20" height="720" fill="#A00000"/>
  <!-- Right curtain -->
  <rect x="1100" y="0" width="180" height="720" fill="#8B0000"/>
  <rect x="1120" y="0" width="25" height="720" fill="#A00000"/>
  <rect x="1175" y="0" width="30" height="720" fill="#A00000"/>
  <rect x="1230" y="0" width="20" height="720" fill="#A00000"/>
  <!-- Top curtain valance -->
  <rect x="0" y="0" width="1280" height="50" fill="#6B0000"/>
  <polygon points="0,50 180,50 160,80" fill="#8B0000"/>
  <polygon points="1280,50 1100,50 1120,80" fill="#8B0000"/>
  <!-- Spotlight 1 -->
  <circle cx="400" cy="500" r="120" fill="#FFD700" opacity="0.15"/>
  <circle cx="400" cy="500" r="80" fill="#FFD700" opacity="0.2"/>
  <circle cx="400" cy="500" r="40" fill="#FFFFFF" opacity="0.1"/>
  <!-- Spotlight 2 -->
  <circle cx="640" cy="480" r="140" fill="#FFD700" opacity="0.15"/>
  <circle cx="640" cy="480" r="90" fill="#FFD700" opacity="0.2"/>
  <circle cx="640" cy="480" r="45" fill="#FFFFFF" opacity="0.1"/>
  <!-- Spotlight 3 -->
  <circle cx="880" cy="500" r="120" fill="#FFD700" opacity="0.15"/>
  <circle cx="880" cy="500" r="80" fill="#FFD700" opacity="0.2"/>
  <circle cx="880" cy="500" r="40" fill="#FFFFFF" opacity="0.1"/>
  <!-- Stage lights on top -->
  <circle cx="400" cy="30" r="12" fill="#FFD700" opacity="0.8"/>
  <circle cx="640" cy="30" r="12" fill="#FFD700" opacity="0.8"/>
  <circle cx="880" cy="30" r="12" fill="#FFD700" opacity="0.8"/>
</svg>
