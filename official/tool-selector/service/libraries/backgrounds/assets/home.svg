<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Wall -->
  <rect x="0" y="0" width="1280" height="720" fill="#F5E6D3"/>
  <!-- Floor -->
  <rect x="0" y="550" width="1280" height="170" fill="#8B6F47"/>
  <!-- Carpet -->
  <rect x="200" y="560" width="500" height="140" fill="#C4463A" rx="5"/>
  <rect x="210" y="570" width="480" height="120" fill="#D4564A" rx="3"/>
  <!-- Couch -->
  <rect x="100" y="380" width="450" height="120" fill="#4A7C59" rx="15"/>
  <rect x="80" y="360" width="50" height="140" fill="#3D6B4A" rx="10"/>
  <rect x="530" y="360" width="50" height="140" fill="#3D6B4A" rx="10"/>
  <rect x="120" y="350" width="420" height="30" fill="#3D6B4A" rx="8"/>
  <!-- Cushions -->
  <rect x="160" y="370" width="80" height="60" fill="#5A9A6E" rx="10"/>
  <rect x="420" y="370" width="80" height="60" fill="#5A9A6E" rx="10"/>
  <!-- TV -->
  <rect x="750" y="200" width="350" height="200" fill="#1A1A1A" rx="5"/>
  <rect x="760" y="210" width="330" height="180" fill="#2C3E50"/>
  <!-- TV stand -->
  <rect x="780" y="400" width="290" height="30" fill="#5A3D2E" rx="3"/>
  <rect x="800" y="430" width="250" height="120" fill="#6B4E3D" rx="3"/>
  <!-- Bookshelf -->
  <rect x="1050" y="100" width="180" height="450" fill="#5A3D2E" stroke="#4A2D1E" stroke-width="2"/>
  <line x1="1050" y1="200" x2="1230" y2="200" stroke="#4A2D1E" stroke-width="3"/>
  <line x1="1050" y1="300" x2="1230" y2="300" stroke="#4A2D1E" stroke-width="3"/>
  <line x1="1050" y1="400" x2="1230" y2="400" stroke="#4A2D1E" stroke-width="3"/>
  <!-- Books -->
  <rect x="1060" y="120" width="20" height="75" fill="#E74C3C"/>
  <rect x="1085" y="130" width="15" height="65" fill="#3498DB"/>
  <rect x="1105" y="125" width="18" height="70" fill="#F39C12"/>
  <rect x="1128" y="135" width="15" height="60" fill="#9B59B6"/>
  <rect x="1060" y="220" width="22" height="75" fill="#2ECC71"/>
  <rect x="1087" y="230" width="16" height="65" fill="#E67E22"/>
  <rect x="1108" y="215" width="20" height="80" fill="#1ABC9C"/>
  <!-- Window -->
  <rect x="30" y="60" width="200" height="250" fill="#87CEEB" stroke="#5A3D2E" stroke-width="5"/>
  <line x1="130" y1="60" x2="130" y2="310" stroke="#5A3D2E" stroke-width="3"/>
  <line x1="30" y1="185" x2="230" y2="185" stroke="#5A3D2E" stroke-width="3"/>
</svg>
