<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Stick Figure: Sitting -->
  <!-- Head -->
  <circle cx="100" cy="60" r="25" stroke="black" stroke-width="8" fill="white"/>
  <!-- Body (upright torso) -->
  <line x1="100" y1="85" x2="100" y2="190" stroke="black" stroke-width="8"/>
  <!-- Left arm (resting on lap) -->
  <line x1="100" y1="130" x2="70" y2="160" stroke="black" stroke-width="8"/>
  <line x1="70" y1="160" x2="80" y2="200" stroke="black" stroke-width="8"/>
  <!-- Right arm (resting on lap) -->
  <line x1="100" y1="130" x2="130" y2="160" stroke="black" stroke-width="8"/>
  <line x1="130" y1="160" x2="120" y2="200" stroke="black" stroke-width="8"/>
  <!-- Thighs (horizontal, bent at waist) -->
  <line x1="100" y1="190" x2="60" y2="200" stroke="black" stroke-width="8"/>
  <line x1="100" y1="190" x2="140" y2="200" stroke="black" stroke-width="8"/>
  <!-- Lower legs (bent at knees, going down) -->
  <line x1="60" y1="200" x2="55" y2="290" stroke="black" stroke-width="8"/>
  <line x1="140" y1="200" x2="145" y2="290" stroke="black" stroke-width="8"/>
  <!-- Feet -->
  <line x1="55" y1="290" x2="42" y2="290" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <line x1="145" y1="290" x2="158" y2="290" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <!-- Chair suggestion lines -->
  <line x1="45" y1="205" x2="155" y2="205" stroke="black" stroke-width="4" stroke-dasharray="6,4"/>
</svg>
