<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Stick Figure: Facepalm -->
  <!-- Head (slightly tilted forward) -->
  <circle cx="100" cy="65" r="25" stroke="black" stroke-width="8" fill="white"/>
  <!-- Body -->
  <line x1="100" y1="90" x2="100" y2="225" stroke="black" stroke-width="8"/>
  <!-- Left arm (at side) -->
  <line x1="100" y1="130" x2="135" y2="180" stroke="black" stroke-width="8"/>
  <!-- Right arm (hand covering face) -->
  <line x1="100" y1="130" x2="80" y2="110" stroke="black" stroke-width="8"/>
  <line x1="80" y1="110" x2="90" y2="70" stroke="black" stroke-width="8"/>
  <!-- Hand on face (fingers spread) -->
  <line x1="85" y1="72" x2="80" y2="58" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="70" x2="88" y2="55" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="69" x2="95" y2="54" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="98" y1="70" x2="102" y2="57" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="100" y1="225" x2="70" y2="340" stroke="black" stroke-width="8"/>
  <!-- Right leg -->
  <line x1="100" y1="225" x2="130" y2="340" stroke="black" stroke-width="8"/>
  <!-- Feet -->
  <line x1="70" y1="340" x2="55" y2="340" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <line x1="130" y1="340" x2="145" y2="340" stroke="black" stroke-width="8" stroke-linecap="round"/>
</svg>
