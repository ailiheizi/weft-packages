<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Stick Figure: Shrug -->
  <!-- Head -->
  <circle cx="100" cy="60" r="25" stroke="black" stroke-width="8" fill="white"/>
  <!-- Body -->
  <line x1="100" y1="85" x2="100" y2="220" stroke="black" stroke-width="8"/>
  <!-- Left arm (out and slightly up, palm up) -->
  <line x1="100" y1="130" x2="45" y2="115" stroke="black" stroke-width="8"/>
  <line x1="45" y1="115" x2="30" y2="105" stroke="black" stroke-width="8"/>
  <!-- Left palm up -->
  <line x1="25" y1="105" x2="35" y2="105" stroke="black" stroke-width="5"/>
  <line x1="25" y1="100" x2="25" y2="110" stroke="black" stroke-width="4"/>
  <!-- Right arm (out and slightly up, palm up) -->
  <line x1="100" y1="130" x2="155" y2="115" stroke="black" stroke-width="8"/>
  <line x1="155" y1="115" x2="170" y2="105" stroke="black" stroke-width="8"/>
  <!-- Right palm up -->
  <line x1="165" y1="105" x2="175" y2="105" stroke="black" stroke-width="5"/>
  <line x1="175" y1="100" x2="175" y2="110" stroke="black" stroke-width="4"/>
  <!-- Left leg -->
  <line x1="100" y1="220" x2="70" y2="340" stroke="black" stroke-width="8"/>
  <!-- Right leg -->
  <line x1="100" y1="220" x2="130" y2="340" stroke="black" stroke-width="8"/>
  <!-- Feet -->
  <line x1="70" y1="340" x2="55" y2="340" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <line x1="130" y1="340" x2="145" y2="340" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <!-- Question marks above head -->
  <text x="75" y="25" font-size="20" font-family="Arial" fill="black">?</text>
  <text x="115" y="20" font-size="16" font-family="Arial" fill="black">?</text>
</svg>
