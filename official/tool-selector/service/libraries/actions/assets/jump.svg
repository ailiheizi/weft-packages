<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <!-- Stick Figure: Jump (arms up, feet off ground) -->
  <!-- Head -->
  <circle cx="100" cy="70" r="25" stroke="black" stroke-width="8" fill="white"/>
  <!-- Body -->
  <line x1="100" y1="95" x2="100" y2="220" stroke="black" stroke-width="8"/>
  <!-- Left arm (raised up) -->
  <line x1="100" y1="130" x2="60" y2="100" stroke="black" stroke-width="8"/>
  <line x1="60" y1="100" x2="50" y2="60" stroke="black" stroke-width="8"/>
  <!-- Right arm (raised up) -->
  <line x1="100" y1="130" x2="140" y2="100" stroke="black" stroke-width="8"/>
  <line x1="140" y1="100" x2="150" y2="60" stroke="black" stroke-width="8"/>
  <!-- Left leg (tucked slightly) -->
  <line x1="100" y1="220" x2="70" y2="275" stroke="black" stroke-width="8"/>
  <line x1="70" y1="275" x2="65" y2="320" stroke="black" stroke-width="8"/>
  <!-- Right leg (tucked slightly) -->
  <line x1="100" y1="220" x2="130" y2="275" stroke="black" stroke-width="8"/>
  <line x1="130" y1="275" x2="135" y2="320" stroke="black" stroke-width="8"/>
  <!-- Feet (off ground) -->
  <line x1="65" y1="320" x2="55" y2="320" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <line x1="135" y1="320" x2="145" y2="320" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <!-- Motion lines below (showing air gap) -->
  <line x1="60" y1="345" x2="80" y2="345" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="355" x2="110" y2="355" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="345" x2="140" y2="345" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground line -->
  <line x1="40" y1="370" x2="160" y2="370" stroke="black" stroke-width="4"/>
</svg>
