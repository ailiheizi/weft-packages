<!doctype html>
<html lang="en">
  <head>

    <title>Weft Context Producer Debug</title>

      body {

        padding: 16px;
        background: #111318;

        font: 12px/1.5 Consolas, "SFMono-Regular", monospace;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .actions {
        display: flex;

      button {
        border: 1px solid #3a4557;

        color: #e7ecf3;
        padding: 6px 10px;

      }

      pre {
        margin: 0;
        padding: 12px;
        background: #0b0e13;
        border: 1px solid #293241;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 240px;
      }
    </style>
  </head>
  <body>
    <h1>Weft Context Producer Debug</h1>
    <div class="actions">
      <button id="refresh-btn" type="button">Refresh</button>
