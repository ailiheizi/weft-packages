<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #0b0f17;
      --surface: #131925;
      --surface-2: #1b2333;
      --border: #283142;
      --text: #e6edf6;
      --text-dim: #9aa7b8;
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
      --ok: #22c55e;
      --warn: #f59e0b;
      --radius: 14px;
      --shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", "PingFang SC", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 70% -10%, #1a2436 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .container { max-width: 880px; margin: 0 auto; }

    /* 顶部标题区 */
    header { margin-bottom: 40px; }
    .eyebrow {
      display: inline-block; font-size: 13px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--accent);
      background: rgba(59,130,246,.12); padding: 4px 12px; border-radius: 999px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 38px; font-weight: 700; line-height: 1.2;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 120%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .subtitle { font-size: 18px; color: var(--text-dim); max-width: 60ch; }

    /* 章节 */
    section { margin: 36px 0; }
    h2 { font-size: 24px; font-weight: 650; margin-bottom: 16px; }
    h3 { font-size: 18px; font-weight: 600; color: var(--text); margin: 20px 0 10px; }
    p { color: var(--text-dim); margin-bottom: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    strong { color: var(--text); font-weight: 650; }

    /* 卡片网格 */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow);
      transition: transform .15s ease, border-color .15s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .card .label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
    .card .value { font-size: 28px; font-weight: 700; color: var(--text); }

    /* 列表 */
    ul, ol { padding-left: 22px; color: var(--text-dim); margin-bottom: 14px; }
    li { margin: 6px 0; }

    /* 表格 */
    table {
      width: 100%; border-collapse: collapse; margin: 18px 0;
      background: var(--surface); border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border);
    }
    th {
      background: var(--surface-2); color: var(--text); font-weight: 600;
      text-align: left; padding: 12px 16px; font-size: 14px;
    }
    td { padding: 12px 16px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 14px; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* 代码 */
    code {
      background: var(--surface-2); color: #f472b6; padding: 2px 7px;
      border-radius: 6px; font-family: "Consolas", "Menlo", monospace; font-size: 13px;
    }
    pre {
      background: #0a0e16; border: 1px solid var(--border); color: #e2e8f0;
      padding: 18px; border-radius: var(--radius); overflow-x: auto;
      font-family: "Consolas", monospace; font-size: 13px; line-height: 1.6;
    }
    pre code { background: none; color: inherit; padding: 0; }

    /* 标签/徽章 */
    .badge {
      display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 999px;
      background: rgba(34,197,94,.15); color: var(--ok); font-weight: 600;
    }
    blockquote {
      border-left: 3px solid var(--accent); background: var(--surface);
      padding: 12px 18px; border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-dim); margin: 16px 0;
    }
    footer {
      margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border);
      color: var(--text-dim); font-size: 13px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="eyebrow">{{EYEBROW}}</span>
      <h1>{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
    </header>

    <!-- 示例：指标卡片网格 -->
    <section>
      <h2>概览</h2>
      <div class="grid">
        <div class="card"><div class="label">指标 A</div><div class="value">128</div></div>
        <div class="card"><div class="label">指标 B</div><div class="value">96%</div></div>
        <div class="card"><div class="label">指标 C</div><div class="value">3.2s</div></div>
      </div>
    </section>

    <!-- 示例：正文 + 列表 -->
    <section>
      <h2>详情</h2>
      <p>这里是正文段落。可以包含 <strong>重点</strong>、<code>代码片段</code> 和 <a href="#">链接</a>。</p>
      <ul>
        <li>列表项一</li>
        <li>列表项二</li>
        <li>列表项三</li>
      </ul>
    </section>

    <!-- 示例：表格 -->
    <section>
      <h2>数据</h2>
      <table>
        <thead><tr><th>名称</th><th>状态</th><th>数值</th></tr></thead>
        <tbody>
          <tr><td>项目一</td><td><span class="badge">正常</span></td><td>42</td></tr>
          <tr><td>项目二</td><td><span class="badge">正常</span></td><td>87</td></tr>
        </tbody>
      </table>
    </section>

    <footer>由 WEFT 生成 · {{FOOTER}}</footer>
  </div>
</body>
</html>
