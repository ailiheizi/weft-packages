[identity]
name = "generic-agent-runtime"
version = "0.1.0"
description = "Experimental self-evolving task runtime inspired by GenericAgent, isolated from WEFT core behavior."
author = "WEFT"
keywords = ["agent", "runtime", "self-evolving", "workflow", "experimental"]

[package]
entry = "server.py"
runtime = "service"
api_version = "weft.package.manifest/v1"
assets = ["ga_runtime", "requirements.txt", "README.md", "data"]

[runtime_contract]
startup_mode = "persistent"
communication = ["http"]
config_delivery = ["env"]
readiness_probe = "http://127.0.0.1:43133/health"
liveness_probe = "http://127.0.0.1:43133/health"
stop_mode = "graceful"
restart_policy = "host_managed"

[capability]
provides = [
  "generic_agent.plan",
  "generic_agent.run",
  "generic_agent.verify",
  "generic_agent.crystallize",
]

[state]
stateful = true

[governance]
permissions = ["storage"]
stability = "experimental"
audit_tags = ["agent", "runtime", "generic-agent"]

[lifecycle]
healthcheck = "http://127.0.0.1:43133/health"
